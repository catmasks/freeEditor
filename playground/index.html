<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>freeEditor-富文本编辑器</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
      }

      #app {
        padding: 10px;
        box-sizing: border-box;
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        gap: 20px;
        overflow: auto;
      }

      #app.dark {
        background: #141414;
      }

      .theme-toggle {
        padding: 8px 16px;
        font-size: 14px;
        cursor: pointer;
        border: 1px solid #ddd;
        border-radius: 4px;
        background: white;
      }

      .theme-toggle:hover {
        background: #f5f5f5;
      }

      #app.dark .theme-toggle {
        background: #2a2a2a;
        color: white;
        border-color: #444;
      }

      #app.dark .theme-toggle:hover {
        background: #3a3a3a;
      }
      #preview {
        width: 100%;

        margin-top: 20px;
        color: #606266;
        overflow-wrap: break-word;

        word-wrap: break-word;

        word-break: break-word;

        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="editor-container"></div>
      <div>
        <button class="theme-toggle" id="theme-toggle">切换主题</button>
        <button class="theme-toggle" id="get-html-btn">获取HTML</button>
      </div>
      <div id="preview"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
